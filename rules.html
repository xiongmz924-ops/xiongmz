    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 标签页切换
            const tabs = {
                'tab-receivable': 'content-receivable',
                'tab-actual': 'content-actual',
                'tab-filter': 'content-filter'
            };

            Object.keys(tabs).forEach(tabId => {
                document.getElementById(tabId).addEventListener('click', function() {
                    // 移除所有标签页的激活状态
                    Object.keys(tabs).forEach(id => {
                        document.getElementById(id).classList.remove('text-primary', 'border-b-2', 'border-primary');
                        document.getElementById(id).classList.add('text-gray-600');
                    });

                    // 隐藏所有内容
                    Object.values(tabs).forEach(contentId => {
                        document.getElementById(contentId).classList.add('hidden');
                    });

                    // 激活当前标签页
                    this.classList.remove('text-gray-600');
                    this.classList.add('text-primary', 'border-b-2', 'border-primary');

                    // 显示对应内容
                    document.getElementById(tabs[tabId]).classList.remove('hidden');
                });
            });
        });
