<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环境配置 - 银行流水自动匹配Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        secondary: '#3B82F6',
                        background: '#F8FAFC',
                        text: '#1E293B',
                        cta: '#F97316'
                    },
                    fontFamily: {

                    }
                }

        }

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;

        body {

</head>
<body class="bg-background text-text min-h-screen">
    <!-- 侧边导航栏 -->
    <aside class="w-64 bg-white shadow-md fixed left-0 top-0 bottom-0 overflow-y-auto z-50">
        <div class="p-4 border-b border-gray-200">
            <div class="flex items-center space-x-2">
                <i class="fa fa-bank text-primary text-2xl"></i>
                <h1 class="text-lg font-semibold text-primary">银行流水自动匹配Agent</h1>
            </div>
        </div>
        <div class="p-4">
            <h2 class="text-sm font-semibold text-gray-500 uppercase mb-4">Agent平台</h2>
            <ul class="space-y-2">
                <li>
                    <a href="index.html" class="flex items-center space-x-3 px-4 py-2 rounded-lg hover:bg-blue-50 text-gray-700">
                        <i class="fa fa-home w-5"></i>
                        <span>首页</span>
                    </a>
                </li>
                <li>
                    <a href="environment.html" class="flex items-center space-x-3 px-4 py-2 rounded-lg bg-blue-50 text-primary font-medium">
                        <i class="fa fa-cog w-5"></i>
                        <span>环境配置</span>
                    </a>
                </li>
                <li>
                    <a href="download.html" class="flex items-center space-x-3 px-4 py-2 rounded-lg hover:bg-blue-50 text-gray-700">
                        <i class="fa fa-download w-5"></i>
                        <span>自动下载流水</span>
                    </a>
                </li>
                <li>
                    <a href="logs.html" class="flex items-center space-x-3 px-4 py-2 rounded-lg hover:bg-blue-50 text-gray-700">
                        <i class="fa fa-history w-5"></i>
                        <span>执行日志</span>
                    </a>
                </li>
            </ul>

            <h2 class="text-sm font-semibold text-gray-500 uppercase mt-8 mb-4">售楼系统-智能稽核</h2>
            <ul class="space-y-2">
                <li>
                    <a href="rules.html" class="flex items-center space-x-3 px-4 py-2 rounded-lg hover:bg-blue-50 text-gray-700">
                        <i class="fa fa-list-alt w-5"></i>
                        <span>稽核规则配置</span>
                    </a>
                </li>
                <li>
                    <a href="audit.html" class="flex items-center space-x-3 px-4 py-2 rounded-lg hover:bg-blue-50 text-gray-700">
                        <i class="fa fa-search w-5"></i>
                        <span>流水稽核工作台</span>
                    </a>
                </li>
                <li>
                    <a href="audit-logs.html" class="flex items-center space-x-3 px-4 py-2 rounded-lg hover:bg-blue-50 text-gray-700">
                        <i class="fa fa-file-text w-5"></i>
                        <span>稽核日志</span>
                    </a>
                </li>
            </ul>
        </div>
        <div class="absolute bottom-4 left-0 right-0 px-4">
            <div class="flex items-center space-x-3 px-4 py-3 rounded-lg bg-blue-50">
                <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center">
                    <i class="fa fa-user"></i>
                </div>
                <div>
                    <div class="text-sm font-medium">明源售楼系统</div>
                    <div class="text-xs text-gray-600">已集成</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="ml-64 p-8">
        <div class="max-w-7xl">
            <!-- 页面标题 -->
            <div class="mb-6">
                <h2 class="text-2xl font-semibold">环境配置</h2>
            </div>

            <!-- 标签页导航 -->
            <div class="bg-white rounded-xl shadow-md mb-6">
                <div class="border-b border-gray-200">
                    <nav class="flex -mb-px">
                        <button class="px-6 py-4 text-primary border-b-2 border-primary font-medium" id="tab-model">
                            大模型配置
                        </button>
                        <button class="px-6 py-4 text-gray-600 hover:text-primary font-medium" id="tab-bank">
                            银行账户配置
                        </button>
                        <button class="px-6 py-4 text-gray-600 hover:text-primary font-medium" id="tab-strategy">
                            执行策略配置
                        </button>
                        <button class="px-6 py-4 text-gray-600 hover:text-primary font-medium" id="tab-mapping">
                            项目映射配置
                        </button>
                    </nav>
                </div>

                <!-- 标签页内容 -->
                <div class="p-6">
                    <!-- 大模型配置 -->
                    <div id="content-model" class="tab-content">
                        <div class="bg-blue-50 rounded-lg p-5">
                            <h3 class="text-lg font-medium mb-4 text-primary">大模型配置</h3>
                            <form class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">模型提供商</label>
                                    <input type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="例如：OpenAI, Anthropic, 百度等">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">模型名称</label>
                                    <input type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="例如：gpt-4o, claude-3-opus等">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">API 端点</label>
                                    <input type="url" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="例如：https://api.openai.com/v1/chat/completions">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                                    <input type="password" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="输入API密钥">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">调用参数</label>
                                    <textarea class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary h-24" placeholder='例如：{"temperature": 0.7, "max_tokens": 1000}'></textarea>
                                </div>
                                <button type="button" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-all-300">
                                    保存配置
                                </button>
                            </form>
                        </div>
                    </div>

                    <!-- 银行账户配置 -->
                    <div id="content-bank" class="tab-content hidden">
                        <div class="bg-blue-50 rounded-lg p-5">
                            <h3 class="text-lg font-medium mb-4 text-primary">银行账户配置</h3>
                            <div class="overflow-x-auto">
                                <table class="w-full bg-white rounded-lg overflow-hidden">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">银行名称</th>
                                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">账号</th>
                                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">自动下载</th>
                                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-200">
                                        <tr>
                                            <td class="px-4 py-3 text-sm">中国建设银行</td>
                                            <td class="px-4 py-3 text-sm">尾号 8888</td>
                                            <td class="px-4 py-3">
                                                <label class="relative inline-flex items-center cursor-pointer">
                                                    <input type="checkbox" class="sr-only peer" checked>
                                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                                                </label>
                                            </td>
                                            <td class="px-4 py-3">
                                                <div class="flex space-x-4">
                                                    <button class="text-primary hover:underline text-sm">编辑</button>
                                                    <button class="text-red-500 hover:underline text-sm">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td class="px-4 py-3 text-sm">中国工商银行</td>
                                            <td class="px-4 py-3 text-sm">尾号 6666</td>
                                            <td class="px-4 py-3">
                                                <label class="relative inline-flex items-center cursor-pointer">
                                                    <input type="checkbox" class="sr-only peer">
                                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                                                </label>
                                            </td>
                                            <td class="px-4 py-3">
                                                <div class="flex space-x-4">
                                                    <button class="text-primary hover:underline text-sm">编辑</button>
                                                    <button class="text-red-500 hover:underline text-sm">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <button type="button" class="w-full border border-dashed border-primary text-primary px-4 py-2 rounded-lg hover:bg-blue-50 transition-all-300 mt-4">
                                <i class="fa fa-plus mr-2"></i> 添加银行账户
                            </button>
                        </div>
                    </div>

                    <!-- 执行策略配置 -->
                    <div id="content-strategy" class="tab-content hidden">
                        <div class="bg-blue-50 rounded-lg p-5">
                            <h3 class="text-lg font-medium mb-4 text-primary">执行策略配置</h3>
                            <form class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">执行频率</label>
                                    <select class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option>每小时</option>
                                        <option>每天</option>
                                        <option>每周</option>
                                        <option>每月</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">执行时间</label>
                                    <input type="time" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                                <button type="button" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-all-300">
                                    保存配置
                                </button>
                            </form>
                        </div>
                    </div>

                    <!-- 项目映射配置 -->
                    <div id="content-mapping" class="tab-content hidden">
                        <div class="bg-blue-50 rounded-lg p-5">
                            <h3 class="text-lg font-medium mb-4 text-primary">项目映射配置</h3>
                            <div class="overflow-x-auto">
                                <table class="w-full bg-white rounded-lg overflow-hidden">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">银行&账号</th>
                                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">售楼项目</th>
                                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-200">
                                        <tr>
                                            <td class="px-4 py-3 text-sm">中国建设银行 (尾号8888)</td>
                                            <td class="px-4 py-3 text-sm">建银花园项目</td>
                                            <td class="px-4 py-3">
                                                <button class="text-primary hover:underline text-sm">绑定项目</button>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td class="px-4 py-3 text-sm">中国工商银行 (尾号6666)</td>
                                            <td class="px-4 py-3 text-sm">工商城项目</td>
                                            <td class="px-4 py-3">
                                                <button class="text-primary hover:underline text-sm">绑定项目</button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 标签页切换
            const tabs = {
                'tab-model': 'content-model',
                'tab-bank': 'content-bank',
                'tab-strategy': 'content-strategy',
                'tab-mapping': 'content-mapping'
            };

            Object.keys(tabs).forEach(tabId => {
                document.getElementById(tabId).addEventListener('click', function() {
                    // 移除所有标签页的激活状态
                    Object.keys(tabs).forEach(id => {
                        document.getElementById(id).classList.remove('text-primary', 'border-b-2', 'border-primary');
                        document.getElementById(id).classList.add('text-gray-600');
                    });

                    // 隐藏所有内容
                    Object.values(tabs).forEach(contentId => {
                        document.getElementById(contentId).classList.add('hidden');
                    });

                    // 激活当前标签页
                    this.classList.remove('text-gray-600');
                    this.classList.add('text-primary', 'border-b-2', 'border-primary');

                    // 显示对应内容
                    document.getElementById(tabs[tabId]).classList.remove('hidden');
                });
            });
        });
    </script>
</body>
</html>
